name: Create Jira issue
on:
  issues:
    types:
      - opened
jobs:
  create-jira-issue:
    runs-on: ubuntu-latest
    steps:
      - name: Login
        uses: atlassian/gajira-login@v3
        env:
          JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          JIRA_USER_EMAIL: ${{ secrets.JIRA_USER_EMAIL }}

      - name: Convert markdown to Jira Syntax
        uses: peter-evans/jira2md@v1
        id: md2jira
        with:
          input-text: |
            ### Github Issue Link
            - ${{ github.event.issue.html_url }}

            ${{ github.event.issue.body }}
          mode: md2jira

      - name: Create Issue (Bug)
        if: contains(github.event.issue.title, 'bug')
        id: create-bug
        uses: atlassian/gajira-create@v3
        with:
          project: LOGI
          issuetype: Bug
          summary: "${{ github.event.issue.title }}"
          description: "${{ steps.md2jira.outputs.output-text }}"


      - name: Create Issue (Story)
        if: contains(github.event.issue.title, 'feat') || contains(github.event.issue.title, 'improvement')
        id: create-story
        uses: atlassian/gajira-create@v3
        with:
          project: LOGI
          issuetype: Story
          summary: "${{ github.event.issue.title }}"
          description: "${{ steps.md2jira.outputs.output-text }}"

      - name: Create Issue (Task)
        if: contains(github.event.issue.title, 'refactor') || contains(github.event.issue.title, 'docs') || contains(github.event.issue.title, 'test')
        id: create-task
        uses: atlassian/gajira-create@v3
        with:
          project: LOGI
          issuetype: Task
          summary: "${{ github.event.issue.title }}"
          description: "${{ steps.md2jira.outputs.output-text }}"

      - name: Log created issue
        run: |
          echo "Jira issue: ${{ steps.create-bug.outputs.issue }}"
          echo "Jira issue: ${{ steps.create-story.outputs.issue }}"
          echo "Jira issue: ${{ steps.create-task.outputs.issue }}"

      - name: Update issue title (Bug)
        if: steps.create-bug.outputs.issue != ''
        uses: actions-cool/issues-helper@v3
        with:
          actions: "update-issue"
          token: ${{ secrets.GITHUB_TOKEN }}
          title: "${{ github.event.issue.title }}(${{ steps.create-bug.outputs.issue }})"

      - name: Update issue title (Story)
        if: steps.create-story.outputs.issue != ''
        uses: actions-cool/issues-helper@v3
        with:
          actions: "update-issue"
          token: ${{ secrets.GITHUB_TOKEN }}
          title: "${{ github.event.issue.title }}(${{ steps.create-story.outputs.issue }})"

      - name: Update issue title (Task)
        if: steps.create-task.outputs.issue != ''
        uses: actions-cool/issues-helper@v3
        with:
          actions: "update-issue"
          token: ${{ secrets.GITHUB_TOKEN }}
          title: "${{ github.event.issue.title }} (${{ steps.create-task.outputs.issue }})"

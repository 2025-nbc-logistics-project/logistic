spring:
  application:
    name: ai
  config:
    import: optional:classpath:env.properties
  datasource:
    url: jdbc:postgresql://localhost:5432/db_ai
    username: postgres
    password: 5432
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: create
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

gemini:
  uri: ${GEMINI_URL}
  key: ${GEMINI_KEY}

server:
  port: 18086
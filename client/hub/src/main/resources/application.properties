spring.application.name=hub

server.port=18083

spring.cloud.discovery.enabled=true

spring.cloud.eureka.client.serviceUrl.defaultZone=http://localhost:8761/eureka/

naver.map.client-id=${NAVER_MAP_HUB_ROUTE_CLIENT_ID}

# postgresql
spring.datasource.url=jdbc:postgresql://localhost:5432/p_hub
spring.datasource.username=postgres
spring.datasource.password=5432
spring.jpa.hibernate.ddl-auto=create

# redis
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.database=0
spring.data.redis.username=default
# systempass
spring.data.redis.password=0000 
management.endpoints.web.exposure.include=*


spring.jpa.show-sql=true
